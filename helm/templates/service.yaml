apiVersion: v1
kind: Service
metadata:
  name: {{ include "weld-reverse-geocoder.fullname" . }}
  labels:
    {{- include "weld-reverse-geocoder.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "weld-reverse-geocoder.selectorLabels" . | nindent 4 }}
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
