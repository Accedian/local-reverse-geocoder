apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "weld-reverse-geocoder.fullname" . }}
  labels:
    {{- include "weld-reverse-geocoder.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "weld-reverse-geocoder.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "weld-reverse-geocoder.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: weld-reverse-geocoder
          image: {{ .Values.image.registry }}/{{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: NODE_ENV
              value: "production"
            {{- if .Values.env.HTTP_PROXY }}
            - name: HTTP_PROXY
              value: {{ .Values.env.HTTP_PROXY | quote }}
            {{- end }}
            {{- if .Values.env.HTTPS_PROXY }}
            - name: HTTPS_PROXY
              value: {{ .Values.env.HTTPS_PROXY | quote }}
            {{- end }}
            {{- if .Values.env.NO_PROXY }}
            - name: NO_PROXY
              value: {{ .Values.env.NO_PROXY | quote }}
            {{- end }}
            {{- if .Values.env.NODE_EXTRA_CA_CERTS }}
            - name: NODE_EXTRA_CA_CERTS
              value: {{ .Values.env.NODE_EXTRA_CA_CERTS | quote }}
            {{- end }}
            {{- if .Values.env.GEOCODER_CA_FILE }}
            - name: GEOCODER_CA_FILE
              value: {{ .Values.env.GEOCODER_CA_FILE | quote }}
            {{- end }}
            {{- if .Values.env.SHOULD_REJECT_UNAUTHORIZED }}
            - name: SHOULD_REJECT_UNAUTHORIZED
              value: {{ .Values.env.SHOULD_REJECT_UNAUTHORIZED | quote }}
            {{- end }}
          ports:
            - containerPort: {{ .Values.service.port }}
              name: http
              protocol: TCP
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
